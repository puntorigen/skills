<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>video-to-splat preview</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; color: #ddd;
        font-family: system-ui, sans-serif; }
      #app { position: fixed; inset: 0; }
      #hud { position: fixed; left: 12px; top: 12px; z-index: 10; font-size: 12px;
        background: rgba(0,0,0,.55); padding: 6px 10px; border-radius: 6px; }
      #err { position: fixed; inset: 0; display: none; place-items: center;
        text-align: center; padding: 2rem; }
      #err code { color: #ffb4b4; }
      /* minimap (bottom-right): floorplan + live camera marker + floor buttons */
      #minimap { position: fixed; right: 12px; bottom: 12px; z-index: 10;
        display: none; align-items: flex-end; gap: 8px; }
      #floorbtns { display: flex; flex-direction: column; gap: 6px; }
      #floorbtns button { width: 34px; height: 34px; border-radius: 8px;
        border: 1px solid #444; background: rgba(0,0,0,.65); color: #ccc;
        font: 600 13px system-ui, sans-serif; cursor: pointer; }
      #floorbtns button:hover { border-color: #888; color: #fff; }
      #floorbtns button.active { background: #2563eb; border-color: #2563eb;
        color: #fff; }
      #planwrap { position: relative; width: 220px; height: 220px;
        border: 1px solid #333; border-radius: 10px; overflow: hidden;
        background: #111114; cursor: crosshair;
        box-shadow: 0 4px 24px rgba(0,0,0,.5); }
      #planimg { position: absolute; inset: 0; width: 100%; height: 100%;
        image-rendering: auto; opacity: .92; user-select: none;
        -webkit-user-drag: none; }
      #plancv { position: absolute; inset: 0; width: 100%; height: 100%; }
      #planlabel { position: absolute; left: 8px; top: 6px; font-size: 11px;
        color: #9ab; text-shadow: 0 1px 2px #000; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">loading splat...</div>
    <div id="minimap">
      <div id="floorbtns"></div>
      <div id="planwrap">
        <img id="planimg" alt="floorplan" />
        <canvas id="plancv" width="220" height="220"></canvas>
        <div id="planlabel"></div>
      </div>
    </div>
    <div id="err">
      <div>
        <h2>Could not render the splat</h2>
        <p id="errmsg"></p>
        <p>This viewer needs <b>Chrome or Edge 134+</b> (WebGPU). Safari/Firefox are not yet supported.</p>
      </div>
    </div>
    <script type="module" src="/index.ts"></script>
  </body>
</html>
