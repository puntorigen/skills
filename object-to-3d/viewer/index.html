<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>object-to-3d preview</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0a0a0f; color: #ddd;
        font-family: system-ui, sans-serif; overflow: hidden; }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; width: 100%; height: 100%; }
      #hud { position: fixed; left: 12px; top: 12px; z-index: 10; font-size: 12px;
        background: rgba(0,0,0,.55); padding: 6px 10px; border-radius: 6px;
        pointer-events: none; }
      #err { position: fixed; inset: 0; display: none; place-items: center;
        text-align: center; padding: 2rem; z-index: 20; }
      #err code { color: #ffb4b4; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">loading splat...</div>
    <div id="err">
      <div>
        <h2>Could not render the splat</h2>
        <p id="errmsg"></p>
        <p>Works in any modern browser with WebGL2 (Chrome, Edge, Firefox, Safari).</p>
      </div>
    </div>
    <script type="module" src="/index.ts"></script>
  </body>
</html>
